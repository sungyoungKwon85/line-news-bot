name: Daily LINE News Bot

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 필요 라이브러리 설치 (최신 구글 LLM 포함)
        run: pip install requests beautifulsoup4 lxml google-genai urllib3

      - name: "[남편] 백엔드 IT 뉴스 봇 실행!"
        env: 
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py

      - name: "[아내] 인지언어학 연구 뉴스 봇 실행!"
        env: 
          JS_LINE_TOKEN: ${{ secrets.JS_LINE_TOKEN }}
          JS_USER_ID: ${{ secrets.JS_USER_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python js.py

      - name: 업데이트 기록 저장 (두 파일 모두)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # 남편 기록 파일 반영
          git add last_posts.json || echo "No main file to add"
          
          # 아내 기록 파일 반영
          git add last_posts_js.json || echo "No wife file to add"
          
          # 변경사항 커밋 및 푸시
          git commit -m "Update daily news records" || echo "No changes to commit"
          git push || echo "No changes to push"
