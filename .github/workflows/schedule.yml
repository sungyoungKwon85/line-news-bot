name: Daily LINE News Bot

on:
  schedule:
    - cron: '0 0 * * *' # 매일 한국 시간 오전 9시 (UTC 00:00)에 자동 실행
  workflow_dispatch: # 테스트를 위해 수동 실행 버튼 활성화

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 봇이 last_post.txt 파일을 수정하고 저장소에 다시 푸시할 수 있도록 권한 부여
      
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 환경 세팅
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 필요한 라이브러리 설치
        run: pip install requests beautifulsoup4 lxml

      - name: 파이썬 크롤러 실행!
        env: # 깃허브 시크릿에 등록한 값을 환경변수로 주입
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          LINE_USER_ID: ${{ secrets.LINE_USER_ID }}
        run: python main.py

      - name: 업데이트된 기록(last_post.txt) 저장소에 반영(Commit & Push)
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add last_post.txt
          git commit -m "Update last_post.txt" || echo "No changes to commit"
          git push
